name: Daily Content Publisher

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC = 11:30 AM IST daily
  workflow_dispatch:        # Manual trigger for testing

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push new articles

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate today's article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_content.py

      - name: Commit and push new article
        run: |
          git config user.name  "AI Tools Bot"
          git config user.email "bot@aitoolshub.com"
          git add _posts/
          git diff --staged --quiet || git commit -m "New article: $(date '+%Y-%m-%d')"
          git push
